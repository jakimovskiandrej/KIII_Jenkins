version: '3.8'

services:
  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins
    ports:
      - "8080:8080"
    volumes:
      - jenkins_home:/var/jenkins_home

  jenkins-blueocean:
    image: jenkins/jenkins:lts
    container_name: jenkins-blueocean
    ports:
      - "8081:8080"
    volumes:
      - jenkins_blueocean:/var/jenkins_home

volumes:
  jenkins_home:
  jenkins_blueocean: